name: Monorepo Dynamic CI/CD

on:
  push:
    branches: [ "master", "main" ]

# Tự cancel các thread cũ
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # JOB 1: KẺ DÒ THÁM (DETECT CHANGES)
  # ==========================================
  changes:
    runs-on: ubuntu-latest
    outputs:
      # Xuất kết quả ra 1 mảng JSON chứa TÊN THƯ MỤC bị thay đổi
      folders: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lọc thư mục thay đổi
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            EurekaService:
              - 'BackEnd/EurekaService/**'
            APIGateway:
              - 'BackEnd/APIGateway/**'
            UserService:
              - 'BackEnd/UserService/**'
            ProductService:
              - 'BackEnd/ProductService/**'
            OrderService:
              - 'BackEnd/OrderService/**'

  # ==========================================
  # JOB 2: NHÀ MÁY BUILD (MATRIX BUILDER)
  # ==========================================
  build-and-push:
    needs: changes
    if: ${{ needs.changes.outputs.folders != '[]' && needs.changes.outputs.folders != '' }}
    runs-on: ubuntu-latest

    # --- BẬT DB ẢO CHO TẤT CẢ CÁC LUỒNG MATRIX ---
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: Inblue
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        folder: ${{ fromJSON(needs.changes.outputs.folders) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test với Maven
        working-directory: ./BackEnd/${{ matrix.folder }}
        run: |
          chmod +x mvnw
          ./mvnw clean verify
        env:
          EUREKA_URL: "http://localhost:8761/eureka/"
          # --- Cung cấp biến môi trường DB ảo cho Spring Boot lúc chạy Test ---
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/Inblue
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: password
          SPRING_JPA_HIBERNATE_DDL_AUTO: create

      - name: Chuẩn hóa tên Docker Image
        id: image-name
        run: |
          LOWERCASE_NAME=$(echo "${{ matrix.folder }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=hoangtugio198/tgdd-$LOWERCASE_NAME" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./BackEnd/${{ matrix.folder }}
          push: true
          tags: ${{ env.repo }}:latest