name: mss301_mobile
description: TechGear — Tech Accessories E-Commerce App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # HTTP
  dio: ^5.4.3

  # Navigation
  go_router: ^14.2.7

  # Local Storage
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Formatting
  intl: ^0.19.0

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Auth
  google_sign_in: ^6.2.1

  # UI Extras
  carousel_slider: ^4.2.1
  smooth_page_indicator: ^1.1.0
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.8
  pinput: 6.0.2

  # Utils
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  openapi_generator: ^6.0.0
  openapi_generator_annotations: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
